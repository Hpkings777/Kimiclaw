<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
<title>Markdown Viewer</title>
<style>
:root {
    --bg: #f7f7f8;
    --bg-card: #ffffff;
    --text: #1a1a1a;
    --text-secondary: #666666;
    --border: #e5e5e5;
    --code-bg: #f0f0f0;
    --code-block-bg: #1e1e1e;
    --code-block-text: #d4d4d4;
    --link: #0066cc;
    --blockquote-border: #ddd;
    --blockquote-bg: #f9f9f9;
    --table-header-bg: #f2f2f2;
    --table-border: #ddd;
}

@media (prefers-color-scheme: dark) {
    :root {
        --bg: #1a1a1a;
        --bg-card: #2a2a2a;
        --text: #e0e0e0;
        --text-secondary: #999999;
        --border: #3a3a3a;
        --code-bg: #2d2d2d;
        --code-block-bg: #1e1e1e;
        --code-block-text: #d4d4d4;
        --link: #4da6ff;
        --blockquote-border: #444;
        --blockquote-bg: #222;
        --table-header-bg: #333;
        --table-border: #444;
    }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    background: var(--bg);
    padding: 16px;
    word-wrap: break-word;
    overflow-wrap: break-word;
}

h1, h2, h3, h4, h5, h6 {
    margin-top: 24px;
    margin-bottom: 12px;
    font-weight: 600;
    line-height: 1.3;
}

h1 { font-size: 24px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
h2 { font-size: 20px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
h3 { font-size: 17px; }
h4 { font-size: 15px; }

p { margin-bottom: 12px; }

a { color: var(--link); text-decoration: none; }
a:hover { text-decoration: underline; }

strong { font-weight: 600; }
em { font-style: italic; }

code {
    font-family: "SF Mono", Monaco, Menlo, Consolas, monospace;
    font-size: 13px;
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
}

pre {
    margin: 12px 0;
    padding: 14px;
    background: var(--code-block-bg);
    color: var(--code-block-text);
    border-radius: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

pre code {
    background: none;
    padding: 0;
    font-size: 13px;
    line-height: 1.5;
    color: inherit;
}

blockquote {
    margin: 12px 0;
    padding: 8px 16px;
    border-left: 4px solid var(--blockquote-border);
    background: var(--blockquote-bg);
    color: var(--text-secondary);
    border-radius: 0 4px 4px 0;
}

blockquote p { margin-bottom: 4px; }
blockquote p:last-child { margin-bottom: 0; }

ul, ol {
    margin: 8px 0;
    padding-left: 24px;
}

li { margin-bottom: 4px; }
li > ul, li > ol { margin: 4px 0; }

hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 14px;
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

thead { background: var(--table-header-bg); }

th, td {
    border: 1px solid var(--table-border);
    padding: 8px 12px;
    text-align: left;
    white-space: nowrap;
}

th { font-weight: 600; }

img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
}

/* 首个标题不需要上边距 */
#content > h1:first-child,
#content > h2:first-child { margin-top: 0; }

/* 任务列表样式 */
li input[type="checkbox"] {
    margin-right: 6px;
}
</style>
</head>
<body>
<div id="content"></div>
<!-- marked.js：完整 GFM Markdown 解析器，本地加载无需网络 -->
<script src="marked.min.js"></script>
<script>
(function() {
    // 配置 marked v4：启用 GFM（表格、删除线等）
    marked.setOptions({
        gfm: true,
        breaks: false,
    });

    // 从 Kotlin 端注入的全局变量读取 markdown 内容并渲染
    if (typeof MARKDOWN_CONTENT !== 'undefined') {
        document.getElementById('content').innerHTML = marked.parse(MARKDOWN_CONTENT);
    }
})();
</script>
</body>
</html>
